name: Garmin morning sync

on:
  schedule:
    # 04:00 UTC = 08:00 Dubai local time (UTC+4, no daylight saving time).
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install garminconnect
        run: pip install garminconnect

      - name: Fetch Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin-sync/fetch_garmin.py

      - name: Commit garmin.json if changed
        run: |
          git config user.name "garmin-sync"
          git config user.email "actions@github.com"
          git add garmin.json
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "Garmin sync $(date -u +%F)"
          git push
