const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const jsDayToProgram = (d) => (d === 0 ? 7 : d);

function readiness(g, selfStatus = "normal") {
  if (!g && selfStatus !== "wired") return null;
  let pts = 0, n = 0;
  const reasons = [];
  if (g && g.sleep_score != null) {
    n++; pts += g.sleep_score >= 75 ? 1 : g.sleep_score >= 60 ? 0.5 : 0;
    if (g.sleep_score < 60) reasons.push("low sleep score");
  }
  if (g && g.body_battery != null) {
    n++; pts += g.body_battery >= 70 ? 1 : g.body_battery >= 50 ? 0.5 : 0;
    if (g.body_battery < 35) reasons.push("low body battery");
  }
  if (g && g.hrv != null && g.hrv_baseline != null) {
    n++; pts += g.hrv >= g.hrv_baseline ? 1 : g.hrv >= g.hrv_baseline * 0.9 ? 0.5 : 0;
    if (g.hrv < g.hrv_baseline * 0.85) reasons.push("HRV well below baseline");
  }
  if (g && g.sleep_hours != null) {
    n++; pts += g.sleep_hours >= 7 ? 1 : g.sleep_hours >= 6 ? 0.5 : 0;
    if (g.sleep_hours < 6) reasons.push("under 6 hours sleep");
  }
  if (g && g.stress != null) {
    n++; pts += g.stress <= 30 ? 1 : g.stress <= 50 ? 0.5 : 0;
    if (g.stress > 50) reasons.push("high Garmin stress");
  }

  const hardStop = g && (
    (g.sleep_hours != null && g.sleep_hours < 5.5) ||
    (g.body_battery != null && g.body_battery < 25) ||
    (g.stress != null && g.stress >= 65) ||
    (g.hrv != null && g.hrv_baseline != null && g.hrv < g.hrv_baseline * 0.8)
  );
  let level = hardStop || (!n && selfStatus === "wired") ? "RED" : (pts / Math.max(n, 1) >= 0.78 ? "GREEN" : pts / Math.max(n, 1) >= 0.5 ? "AMBER" : "RED");
  if (selfStatus === "wired") {
    reasons.unshift("you feel wired or drained");
    level = level === "GREEN" ? "AMBER" : "RED";
  }

  if (level === "GREEN") return {
    level, color: C.green, rpe: "7\u20138", rir: "2\u20133", volume: "100%", rest: "90\u2013150 sec",
    msg: "Good recovery signals. Complete the planned sets with clean reps and no grinding.", reasons,
  };
  if (level === "AMBER") return {
    level, color: C.amber, rpe: "6\u20137", rir: "3\u20134", volume: "70\u201380%", rest: "120\u2013180 sec",
    msg: "Use lighter loads, remove one set from each non-priority exercise and avoid failure or drop sets.", reasons,
  };
  return {
    level: "RED", color: C.hot, rpe: "RECOVERY", rir: "\u2014", volume: "0\u201340%", rest: "Easy pace",
    msg: "Skip hard lifting. Choose an easy walk, mobility or a very short technique-only session if you feel well.", reasons,
  };
}

function VTaperCoach() {
  const [tab, setTab] = useState("today");
  const [state, setState] = useState(null);
  const [selDay, setSelDay] = useState(jsDayToProgram(new Date().getDay()));
  const [openEx, setOpenEx] = useState(null);
  const [timer, setTimer] = useState(null);
  const [toast, setToast] = useState(null);
  const [garmin, setGarmin] = useState(null);
  const saveT = useRef(null);
  const timerRef = useRef(null);

  /* fetch this morning's Garmin snapshot (written by the GitHub Action) */
  useEffect(() => {
    fetch("garmin.json", { cache: "no-store" })
      .then((r) => (r.ok ? r.json() : null))
      .then((g) => g && setGarmin(g))
      .catch(() => {});
  }, []);

  /* auto-log Garmin scale weight into the body log once per day */
  useEffect(() => {
    if (!state || !garmin) return;
    const tkNow = todayKey();
    if (garmin.date !== tkNow || garmin.weight_kg == null) return;
    const existing = state.body.find((b) => b.d === tkNow);
    if (existing && existing.kg != null) return;
    const body = state.body.filter((b) => b.d !== tkNow);
    body.push({ d: tkNow, kg: garmin.weight_kg, waist: existing ? existing.waist : null });
    body.sort((a, b) => (a.d < b.d ? -1 : 1));
    persist({ ...state, body });
  }, [state, garmin]);

  useEffect(() => {
    (async () => {
      let data = { startDate: null, restSec: 90, logs: {}, habits: {}, body: [], checkins: {} };
      try {
        const res = await storage.get("vtaper-v2");
        if (res && res.value) data = { ...data, ...JSON.parse(res.value) };
      } catch (e) {}
      if (!data.startDate) {
        const d = new Date();
        const diff = (d.getDay() + 6) % 7;
        d.setDate(d.getDate() - diff);
        data.startDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }
      setState(data);
    })();
  }, []);

  const persist = (next) => {
    setState(next);
    if (saveT.current) clearTimeout(saveT.current);
    saveT.current = setTimeout(async () => {
      try { await storage.set("vtaper-v2", JSON.stringify(next)); }
      catch (e) { console.error("save failed", e); }
    }, 400);
  };

  useEffect(() => {
    if (timer === null) return;
    if (timer <= 0) {
      setToast("Rest done \u2014 next set");
      setTimeout(() => setToast(null), 2500);
      setTimer(null);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      return;
    }
    timerRef.current = setTimeout(() => setTimer((t) => t - 1), 1000);
    return () => clearTimeout(timerRef.current);
  }, [timer]);

  const week = useMemo(() => {
    if (!state) return 1;
    const start = new Date(state.startDate + "T00:00:00");
    const now = new Date();
    const w = Math.floor((now - start) / (7 * 864e5)) + 1;
    return Math.min(Math.max(w, 1), 8);
  }, [state]);

  if (!state) {
    return (
      <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", color: C.dim, fontFamily: "system-ui" }}>
        Loading your program\u2026
      </div>
    );
  }

  const phase = week <= 4 ? "FOUNDATION" : "INTENSIFICATION";
  const tk = todayKey();
  const todayNum = jsDayToProgram(new Date().getDay());
  const effSets = (ex) => ex.s + (week >= 5 && ex.lat ? 1 : 0);

  const setField = (exIdx, setIdx, field, val) => {
    const logs = { ...state.logs };
    const cur = logs[tk] && logs[tk].day === selDay ? { ...logs[tk], ex: { ...logs[tk].ex } } : { day: selDay, ex: {} };
    const arr = [...(cur.ex[exIdx] || [])];
    while (arr.length <= setIdx) arr.push({ w: "", r: "", done: false });
    arr[setIdx] = { ...arr[setIdx], [field]: val };
    cur.ex[exIdx] = arr;
    logs[tk] = cur;
    persist({ ...state, logs });
  };

  const toggleDone = (exIdx, setIdx) => {
    const cur = state.logs[tk] && state.logs[tk].day === selDay ? state.logs[tk] : { day: selDay, ex: {} };
    const arr = cur.ex[exIdx] || [];
    const wasDone = arr[setIdx] && arr[setIdx].done;
    setField(exIdx, setIdx, "done", !wasDone);
    if (!wasDone) {
      setTimer(state.restSec);
      const exercise = PROGRAM[selDay].ex[exIdx];
      const nSets = effSets(exercise);
      const finishing = [...Array(nSets)].every((_, i) => i === setIdx || (arr[i] && arr[i].done));
      if (finishing) {
        setOpenEx(null);
        setToast(`${exercise.name} complete`);
        setTimeout(() => setToast(null), 2200);
      }
    }
  };

  const prevKeys = Object.keys(state.logs)
    .filter((k) => k < tk && state.logs[k].day === selDay)
    .sort()
    .reverse();
  const prevLog = prevKeys.length ? state.logs[prevKeys[0]] : null;

  const dayDone = (dateKey) => {
    const log = state.logs[dateKey];
    if (!log) return 0;
    let n = 0;
    Object.values(log.ex).forEach((arr) => arr.forEach((s) => s.done && n++));
    return n;
  };

  const toggleHabit = (id) => {
    const habits = { ...state.habits, [tk]: { ...(state.habits[tk] || {}), [id]: !(state.habits[tk] && state.habits[tk][id]) } };
    persist({ ...state, habits });
  };

  const setCheckin = (value) => {
    const checkins = { ...(state.checkins || {}), [tk]: value };
    persist({ ...state, checkins });
  };

  const copyPrevious = (exIdx, nSets, previous) => {
    const logs = { ...state.logs };
    const cur = logs[tk] && logs[tk].day === selDay ? { ...logs[tk], ex: { ...logs[tk].ex } } : { day: selDay, ex: {} };
    cur.ex[exIdx] = [...Array(nSets)].map((_, si) => ({
      w: previous[si] && previous[si].w != null ? previous[si].w : "",
      r: previous[si] && previous[si].r != null ? previous[si].r : "",
      done: false,
    }));
    logs[tk] = cur;
    persist({ ...state, logs });
    setToast("Previous weights copied");
    setTimeout(() => setToast(null), 1800);
  };

  const addBody = (kg, waist) => {
    if (!kg && !waist) return;
    const body = state.body.filter((b) => b.d !== tk);
    body.push({ d: tk, kg: kg ? parseFloat(kg) : null, waist: waist ? parseFloat(waist) : null });
    body.sort((a, b) => (a.d < b.d ? -1 : 1));
    persist({ ...state, body });
    setToast("Logged"); setTimeout(() => setToast(null), 1800);
  };

  const lastBody = state.body.length ? state.body[state.body.length - 1] : null;
  const day = PROGRAM[selDay];
  const todayProg = PROGRAM[todayNum];
  const checkin = (state.checkins && state.checkins[tk]) || "normal";
  const currentGarmin = garmin && garmin.date === tk ? garmin : null;
  const recovery = readiness(currentGarmin, checkin);

  return (
    <div className="app-shell" style={{ background: C.bg, color: C.text, fontFamily: "'Inter', system-ui, sans-serif", paddingBottom: 138 }}>

      <header className="screen-pad" style={{ paddingTop: "max(18px, env(safe-area-inset-top))", paddingBottom: 13, borderBottom: `1px solid ${C.border}`, background: C.bg, position: "sticky", top: 0, zIndex: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
          <div>
            <div className="anton" style={{ fontSize: 26, lineHeight: 1 }}>
              V-TAPER <span style={{ color: C.amber }}>COACH</span>
            </div>
            <div className="mono" style={{ fontSize: 12, color: C.dim, marginTop: 5 }}>
              WEEK {week}/8 · {phase}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div className="mono" style={{ fontSize: 11, color: C.dim }}>TARGET</div>
            <div className="mono" style={{ fontSize: 13, fontWeight: 600 }}>
              {GOAL.kg}<span style={{ color: C.faint }}>kg</span> · {GOAL.waist}<span style={{ color: C.faint }}>cm</span>
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 3, marginTop: 10 }}>
          {[...Array(8)].map((_, i) => (
            <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i < week ? (i >= 4 ? C.hot : C.amber) : C.border }} />
          ))}
        </div>
      </header>

      {tab === "today" && (
        <div className="screen-pad" style={{ paddingTop: 16, paddingBottom: 18 }}>
          <GarminCard garmin={garmin} tk={tk} checkin={checkin} onCheckin={setCheckin} />
          <div
            onClick={() => { setSelDay(todayNum); setTab("train"); }}
            style={{
              background: `linear-gradient(140deg, ${C.card} 55%, ${todayProg.color}18)`,
              border: `1px solid ${todayProg.priority ? C.amber : C.border}`,
              borderRadius: 16, padding: 20, cursor: "pointer",
            }}
          >
            <div className="mono" style={{ fontSize: 11, color: C.dim }}>
              TODAY · {DAY_NAMES[todayNum]}{todayProg.priority ? " \u00b7 \u2b50 PRIORITY DAY" : ""}
            </div>
            <div className="anton" style={{ fontSize: 34, marginTop: 6, color: todayProg.rest ? C.dim : C.text, lineHeight: 1.05 }}>
              {todayProg.title}
            </div>
            <div style={{ fontSize: 14, color: C.dim, marginTop: 4 }}>{todayProg.sub}</div>
            {!todayProg.rest && (
              <div style={{ display: "flex", gap: 14, marginTop: 14 }}>
                <Stat label="SETS" value={todayProg.ex.reduce((a, e) => a + effSets(e), 0)} />
                <Stat label="MIN" value={todayProg.mins} />
                <Stat label="DONE" value={dayDone(tk)} color={dayDone(tk) > 0 ? C.green : undefined} />
                <div style={{ marginLeft: "auto", alignSelf: "center", background: C.amber, color: "#111", fontWeight: 700, fontSize: 13, padding: "10px 16px", borderRadius: 10 }}>
                  TRAIN →
                </div>
              </div>
            )}
            {todayProg.rest && <div style={{ marginTop: 12, fontSize: 13, color: C.dim, lineHeight: 1.5 }}>{todayProg.note}</div>}
          </div>

          {week >= 5 && !todayProg.rest && (
            <div style={{ marginTop: 12, background: `${C.hot}14`, border: `1px solid ${C.hot}44`, borderRadius: 12, padding: "10px 14px", fontSize: 12.5, color: C.text }}>
              <b style={{ color: C.hot }}>WEEK 5–8:</b> Readiness overrides intensification. Never exceed today's RPE shown above; skip rest-pause and drop sets unless GREEN.
            </div>
          )}

          <SectionTitle>NON-NEGOTIABLES</SectionTitle>
          {HABITS.map((h) => {
            const on = !!(state.habits[tk] && state.habits[tk][h.id]);
            return (
              <button key={h.id} onClick={() => toggleHabit(h.id)}
                style={{
                  display: "flex", alignItems: "center", gap: 12, width: "100%", textAlign: "left",
                  background: C.card, border: `1px solid ${on ? C.green + "66" : C.border}`,
                  borderRadius: 12, padding: "13px 14px", marginBottom: 8, color: C.text,
                }}>
                <div style={{
                  width: 26, height: 26, borderRadius: 8, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                  background: on ? C.green : "transparent", border: `2px solid ${on ? C.green : C.faint}`,
                  color: "#0C0E12", fontWeight: 800, fontSize: 15,
                }}>{on ? "\u2713" : ""}</div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, textDecoration: on ? "line-through" : "none", opacity: on ? 0.6 : 1 }}>{h.label}</div>
                  <div style={{ fontSize: 11.5, color: C.faint }}>{h.detail}</div>
                </div>
              </button>
            );
          })}

          <SectionTitle>MORNING CHECK-IN</SectionTitle>
          <BodyLogger onSave={addBody} last={lastBody} today={state.body.find((b) => b.d === tk)} />
        </div>
      )}

      {tab === "train" && (
        <div className="screen-pad" style={{ paddingTop: 14 }}>
          <div className="scroll-days" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 12 }}>
            {[1, 2, 3, 4, 5, 6, 7].map((d) => {
              const p = PROGRAM[d];
              const active = d === selDay;
              return (
                <button key={d} onClick={() => { setSelDay(d); setOpenEx(null); }}
                  style={{
                    flexShrink: 0, minWidth: 56, padding: "9px 7px", borderRadius: 11,
                    background: active ? (p.priority ? C.amber : C.text) : C.card,
                    color: active ? "#0C0E12" : d === todayNum ? C.amber : C.dim,
                    border: `1px solid ${active ? "transparent" : C.border}`,
                    fontWeight: 700, fontSize: 12,
                  }}>
                  {DAY_NAMES[d]}{p.priority ? " \u2b50" : ""}
                </button>
              );
            })}
          </div>

          <div className="anton" style={{ fontSize: 28, lineHeight: 1.05 }}>{day.title}</div>
          <div style={{ fontSize: 13, color: C.dim, marginBottom: 4 }}>{day.sub}</div>
          {!day.rest && (
            <div className="mono" style={{ fontSize: 11, color: C.faint, marginBottom: 14 }}>
              {day.ex.reduce((a, e) => a + effSets(e), 0)} SETS · {day.mins} MIN{prevLog ? " \u00b7 LAST SESSION SHOWN IN GREY" : ""}
            </div>
          )}

          {!day.rest && <TrainingDose r={recovery} compact />}

          {day.rest && (
            <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: 18, fontSize: 14, color: C.dim, lineHeight: 1.6, marginTop: 8 }}>
              {day.note}
            </div>
          )}

          {day.ex.map((ex, i) => {
            const nSets = effSets(ex);
            const cur = (state.logs[tk] && state.logs[tk].day === selDay ? state.logs[tk].ex[i] : null) || [];
            const prev = (prevLog && prevLog.ex && prevLog.ex[i]) || [];
            const doneCount = cur.filter((s) => s && s.done).length;
            const open = openEx === i;
            const complete = doneCount >= nSets && nSets > 0;
            const showBody = !complete || open;
            const hasPrevious = prev.some((s) => s && (s.w || s.r));
            const formGuide = FORM_GUIDES[ex.name] || [ex.cue];
            return (
              <div key={i} data-testid={`exercise-${i}`} style={{ background: C.card, border: `2px solid ${complete ? C.green : C.border}`, borderRadius: 16, marginBottom: 12, overflow: "hidden" }}>
                <button onClick={() => setOpenEx(open ? null : i)}
                  aria-expanded={open}
                  style={{ width: "100%", textAlign: "left", background: complete ? `${C.green}10` : "transparent", border: "none", color: C.text, padding: complete && !open ? "11px 14px" : "14px 14px 12px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
                    <div className="mono" style={{
                      flexShrink: 0, width: 38, height: 38, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center",
                      background: complete ? C.green : ex.score === 10 ? C.amber : C.surface, color: complete || ex.score === 10 ? "#07100C" : C.text,
                      fontWeight: 900, fontSize: complete ? 20 : 14, border: `1px solid ${complete ? C.green : ex.score === 10 ? C.amber : C.border}`,
                    }}>{complete ? "\u2713" : ex.score}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 17, fontWeight: 800, lineHeight: 1.25 }}>
                        {ex.name} {ex.ecc && <span style={{ color: C.hot, fontSize: 11 }}>⚠ 3s ECC</span>}
                      </div>
                      <div className="mono" style={{ fontSize: 12, color: complete ? C.green : C.dim, marginTop: 4, lineHeight: 1.4 }}>
                        {complete && !open ? `COMPLETE \u00b7 ${doneCount} SETS \u00b7 TAP TO REOPEN` : `${nSets} \u00d7 ${ex.reps}${week >= 5 && ex.lat ? " (+1 set)" : ""} \u00b7 ${ex.tempo}`}
                      </div>
                    </div>
                    <div style={{ textAlign: "right", alignSelf: "center" }}>
                      <div className="mono" style={{ fontSize: 13, color: complete ? C.green : C.text, fontWeight: 900 }}>
                        {complete && !open ? "\u25be" : `${doneCount}/${nSets}`}
                      </div>
                      {(!complete || open) && <div className="mono" style={{ color: C.ice, fontSize: 9.5, fontWeight: 800, marginTop: 3 }}>FORM {open ? "\u25b4" : "\u25be"}</div>}
                    </div>
                  </div>
                </button>

                {showBody && (
                  <div style={{ padding: "0 12px 13px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7, minHeight: 26 }}>
                      <div className="mono" style={{ width: 34, fontSize: 11, color: C.faint, textAlign: "center" }}>SET</div>
                      <div className="mono" style={{ flex: 1, fontSize: 11, color: C.dim, textAlign: "center", fontWeight: 800 }}>WEIGHT</div>
                      <div style={{ width: 12 }} />
                      <div className="mono" style={{ flex: 1, fontSize: 11, color: C.dim, textAlign: "center", fontWeight: 800 }}>REPS</div>
                      <div style={{ width: 52 }} />
                    </div>
                    {hasPrevious && doneCount === 0 && (
                      <button onClick={() => copyPrevious(i, nSets, prev)}
                        style={{ width: "100%", minHeight: 42, marginBottom: 9, borderRadius: 10, background: `${C.ice}12`, color: C.ice, border: `1px solid ${C.ice}88`, fontWeight: 800, fontSize: 13 }}>
                        COPY LAST SESSION'S WEIGHTS + REPS
                      </button>
                    )}
                    {[...Array(nSets)].map((_, si) => {
                      const s = cur[si] || {};
                      const p = prev[si] || {};
                      return (
                        <div key={si} className="setrow" style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8, padding: s.done ? "3px" : 0, borderRadius: 12, background: s.done ? `${C.green}0D` : "transparent" }}>
                          <div className="mono" style={{ width: 31, height: 31, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: s.done ? "#07100C" : C.text, background: s.done ? C.green : C.surface, border: `1px solid ${s.done ? C.green : C.border}` }}>{si + 1}</div>
                          <input data-testid={`exercise-${i}-set-${si}-weight`} aria-label={`${ex.name}, set ${si + 1}, weight`} inputMode="decimal" autoComplete="off" placeholder={p.w ? `${p.w}` : "kg"} value={s.w || ""}
                            onFocus={(e) => e.target.select()} onChange={(e) => setField(i, si, "w", e.target.value)}
                            style={inp(s.done)} />
                          <span style={{ color: C.dim, fontSize: 15 }}>×</span>
                          <input data-testid={`exercise-${i}-set-${si}-reps`} aria-label={`${ex.name}, set ${si + 1}, repetitions`} inputMode="numeric" autoComplete="off" placeholder={p.r ? `${p.r}` : "reps"} value={s.r || ""}
                            onFocus={(e) => e.target.select()} onChange={(e) => setField(i, si, "r", e.target.value)}
                            style={inp(s.done)} />
                          <button data-testid={`exercise-${i}-set-${si}-done`} aria-label={`${s.done ? "Reopen" : "Complete"} set ${si + 1}`} onClick={() => toggleDone(i, si)}
                            style={{
                              width: 52, height: 52, minHeight: 52, borderRadius: 12, flexShrink: 0,
                              background: s.done ? C.green : C.surface,
                              border: `2px solid ${s.done ? C.green : C.dim}`,
                              color: s.done ? "#07100C" : C.text, fontWeight: 900, fontSize: 22,
                            }}>✓</button>
                        </div>
                      );
                    })}
                  </div>
                )}

                {open && (
                  <div style={{ borderTop: `1px solid ${C.border}`, padding: "14px", background: C.surface }}>
                    <div className="mono" style={{ fontSize: 11, color: C.amber, fontWeight: 800, letterSpacing: 1.2 }}>BEST FORM</div>
                    <div style={{ fontSize: 14, color: C.text, lineHeight: 1.55, marginTop: 8, fontWeight: 650 }}>{ex.cue}</div>
                    <ol style={{ margin: "10px 0 0", paddingLeft: 22, color: C.dim }}>
                      {formGuide.map((step, stepIdx) => <li key={stepIdx} style={{ fontSize: 14, lineHeight: 1.5, marginBottom: 7, paddingLeft: 3 }}>{step}</li>)}
                    </ol>
                    {ex.drop && <div style={{ marginTop: 8, fontSize: 13, lineHeight: 1.45, color: C.hot, fontWeight: 700 }}>GREEN days only: 12 reps \u2192 reduce weight \u2192 10 \u2192 reduce \u2192 8. Stop if form changes.</div>}
                    {ex.yt && (
                      <a href={`https://www.youtube.com/watch?v=${ex.yt}`} target="_blank" rel="noreferrer"
                        style={{ display: "inline-flex", alignItems: "center", minHeight: 48, marginTop: 8, color: C.ice, fontSize: 14, fontWeight: 800, textDecoration: "none" }}>
                        ▶ WATCH FORM VIDEO
                      </a>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {tab === "progress" && (
        <div className="screen-pad" style={{ paddingTop: 18, paddingBottom: 18 }}>
          <div style={{ display: "flex", gap: 10 }}>
            <BigStat label="WEIGHT" value={(lastBody && lastBody.kg) || GOAL.startKg} unit="kg" goal={GOAL.kg} start={GOAL.startKg} />
            <BigStat label="WAIST" value={(lastBody && lastBody.waist) || GOAL.startWaist} unit="cm" goal={GOAL.waist} start={GOAL.startWaist} />
          </div>

          <SectionTitle>WEIGHT — TARGET {GOAL.kg}KG</SectionTitle>
          <Chart data={state.body.filter((b) => b.kg).map((b) => b.kg)} goal={GOAL.kg} color={C.amber} />

          <SectionTitle>WAIST — TARGET {GOAL.waist}CM</SectionTitle>
          <Chart data={state.body.filter((b) => b.waist).map((b) => b.waist)} goal={GOAL.waist} color={C.ice} />

          <SectionTitle>LOG ENTRY</SectionTitle>
          <BodyLogger onSave={addBody} last={lastBody} today={state.body.find((b) => b.d === tk)} />

          <SectionTitle>SESSION HISTORY</SectionTitle>
          {Object.keys(state.logs).sort().reverse().slice(0, 14).map((k) => {
            const l = state.logs[k];
            const p = PROGRAM[l.day];
            const n = dayDone(k);
            if (!n) return null;
            return (
              <div key={k} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{p.title}</div>
                  <div className="mono" style={{ fontSize: 11, color: C.faint }}>{k}</div>
                </div>
                <div className="mono" style={{ fontSize: 13, color: C.green, fontWeight: 600 }}>{n} sets</div>
              </div>
            );
          })}
          {Object.keys(state.logs).length === 0 && (
            <div style={{ color: C.faint, fontSize: 13, padding: "8px 2px" }}>No sessions logged yet. Hit TRAIN and check off your first set.</div>
          )}
        </div>
      )}

      {tab === "plan" && (
        <div className="screen-pad" style={{ paddingTop: 18, paddingBottom: 18 }}>
          <SectionTitle>THE SPLIT — 4-EXPERT CONSENSUS v2.0</SectionTitle>
          {[1, 2, 3, 4, 5, 6, 7].map((d) => {
            const p = PROGRAM[d];
            return (
              <button key={d} onClick={() => { setSelDay(d); setTab("train"); }}
                style={{
                  display: "flex", alignItems: "center", gap: 12, width: "100%", textAlign: "left",
                  background: d === todayNum ? `linear-gradient(90deg, ${C.card}, ${p.color}12)` : C.card,
                  border: `1px solid ${p.priority ? C.amber + "77" : C.border}`,
                  borderRadius: 12, padding: "13px 14px", marginBottom: 8, color: C.text,
                }}>
                <div className="mono" style={{ width: 36, fontSize: 12, fontWeight: 700, color: d === todayNum ? C.amber : C.faint }}>{DAY_NAMES[d]}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{p.title}{p.priority ? " \u2b50" : ""}</div>
                  <div style={{ fontSize: 11.5, color: C.faint }}>{p.sub}</div>
                </div>
                {!p.rest && <div className="mono" style={{ fontSize: 11, color: C.dim }}>{p.ex.reduce((a, e) => a + effSets(e), 0)} sets</div>}
              </button>
            );
          })}

          <SectionTitle>PHASES</SectionTitle>
          <Rule t="Weeks 1\u20134 \u00b7 Foundation" d="Use today's Garmin prescription. On GREEN, cap work at RPE 7\u20138 and keep 2\u20133 reps in reserve." />
          <Rule t="Weeks 5\u20138 \u00b7 Controlled progression" d="Readiness always overrides the phase. Add lateral-raise volume only on GREEN days; never chase failure." hot />

          <SectionTitle>RULES</SectionTitle>
          <Rule t="3-sec eccentric on ALL lateral raises" d="~45s time-under-tension per set. This is where the caps grow." />
          <Rule t="Cortisol-aware guardrail" d="Garmin cannot measure cortisol. Stress, HRV, sleep and your symptom check-in are conservative proxies; your clinician's advice overrides the app." />
          <Rule t="Morning training" d="Hydrate first. Do not force a hard fasted session or extra caffeine when you feel wired, drained, dizzy or unwell." />
          <Rule t="No flat pressing, no heavy obliques, zero calves" d="Upper chest shelf only. Nothing that thickens the waist. Calves eliminated by consensus." />
          <Rule t="Macros" d="2000\u20132100 kcal \u00b7 200g protein \u00b7 150\u2013180g carbs \u00b7 55\u201365g fat." />
          <Rule t="Sleep 7h+" d="Garmin-tracked. Magnesium glycinate before bed." />

          <SectionTitle>SETTINGS</SectionTitle>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14 }}>
            <label style={{ fontSize: 12, color: C.dim, display: "block", marginBottom: 6 }}>Program start date (Week 1 Monday)</label>
            <input type="date" value={state.startDate}
              onChange={(e) => persist({ ...state, startDate: e.target.value })}
              style={{ ...inp(false), width: "100%", colorScheme: "dark" }} />
            <label style={{ fontSize: 12, color: C.dim, display: "block", margin: "14px 0 6px" }}>Rest timer (seconds)</label>
            <div style={{ display: "flex", gap: 8 }}>
              {[60, 90, 120, 150].map((s) => (
                <button key={s} onClick={() => persist({ ...state, restSec: s })} className="mono"
                  style={{
                    flex: 1, padding: "10px 0", borderRadius: 10, fontWeight: 700, fontSize: 13,
                    background: state.restSec === s ? C.amber : C.surface,
                    color: state.restSec === s ? "#111" : C.dim,
                    border: `1px solid ${state.restSec === s ? C.amber : C.border}`,
                  }}>{s}s</button>
              ))}
            </div>
          </div>
        </div>
      )}

      {timer !== null && (
        <div style={{
          position: "fixed", left: "50%", transform: "translateX(-50%)", width: "min(calc(100% - 24px), 496px)", bottom: 88, zIndex: 40,
          background: C.amber, color: "#0C0E12", borderRadius: 14, padding: "12px 16px",
          display: "flex", alignItems: "center", gap: 14, boxShadow: "0 8px 28px rgba(0,0,0,0.5)",
        }}>
          <div className="anton" style={{ fontSize: 30, minWidth: 76 }}>
            {Math.floor(timer / 60)}:{String(timer % 60).padStart(2, "0")}
          </div>
          <div style={{ fontSize: 12.5, fontWeight: 700, flex: 1 }}>REST</div>
          <button onClick={() => setTimer((t) => t + 30)} style={{ background: "rgba(0,0,0,0.15)", border: "none", borderRadius: 9, padding: "9px 13px", fontWeight: 800, fontSize: 13 }}>+30s</button>
          <button onClick={() => setTimer(null)} style={{ background: "rgba(0,0,0,0.15)", border: "none", borderRadius: 9, padding: "9px 13px", fontWeight: 800, fontSize: 13 }}>SKIP</button>
        </div>
      )}

      {toast && (
        <div style={{ position: "fixed", left: "50%", transform: "translateX(-50%)", bottom: 150, zIndex: 50, background: C.green, color: "#0C0E12", fontWeight: 700, fontSize: 13, padding: "10px 18px", borderRadius: 999 }}>
          {toast}
        </div>
      )}

      <nav style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "min(100%, 520px)", zIndex: 30,
        background: "rgba(19,22,28,0.96)", backdropFilter: "blur(12px)",
        borderTop: `1px solid ${C.border}`, display: "flex",
        paddingBottom: "env(safe-area-inset-bottom, 8px)",
      }}>
        {[
          ["today", "TODAY", "\u25c9"],
          ["train", "TRAIN", "\u25b2"],
          ["progress", "PROGRESS", "\u25e2"],
          ["plan", "PLAN", "\u2261"],
        ].map(([id, label, icon]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{
               flex: 1, padding: "11px 0 10px", background: "transparent", border: "none", minHeight: 62,
              color: tab === id ? C.amber : C.faint,
            }}>
            <div style={{ fontSize: 17 }}>{icon}</div>
            <div className="mono" style={{ fontSize: 10, fontWeight: 700, marginTop: 2 }}>{label}</div>
          </button>
        ))}
      </nav>
    </div>
  );
}

const inp = (done) => ({
  flex: 1, minWidth: 0, height: 52, borderRadius: 11, border: `2px solid ${done ? C.green : C.dim}`,
  background: done ? `${C.green}0D` : C.surface, color: done ? C.green : C.text, fontSize: 18, fontWeight: 800,
  textAlign: "center", padding: "0 6px",
});

function TrainingDose({ r, compact = false }) {
  if (!r) return (
    <div style={{ background: C.card, border: `2px solid ${C.border}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
      <div style={{ fontSize: 14, fontWeight: 800 }}>No current recovery score</div>
      <div style={{ color: C.dim, fontSize: 13, lineHeight: 1.45, marginTop: 4 }}>Keep today's session easy until Garmin data and your check-in are available.</div>
    </div>
  );
  const items = compact
    ? [["RPE", r.rpe], ["RIR", r.rir], ["VOL", r.volume], ["REST", r.rest.replace(" sec", "s")]]
    : [["RPE", r.rpe], ["REPS LEFT", r.rir], ["VOLUME", r.volume], ["REST", r.rest]];
  return (
    <div style={{ background: `${r.color}12`, border: `2px solid ${r.color}`, borderRadius: 15, padding: compact ? 12 : 14, marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
        <div className="mono" style={{ fontSize: 12, color: C.text, fontWeight: 900, letterSpacing: .8 }}>TODAY'S TRAINING DOSE</div>
        <div className="mono" style={{ color: "#07100C", background: r.color, borderRadius: 999, padding: "5px 11px", fontSize: 12, fontWeight: 900 }}>{r.level}</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: compact ? "repeat(4, minmax(0, 1fr))" : "repeat(2, minmax(0, 1fr))", gap: compact ? 5 : 8, marginTop: compact ? 9 : 11 }}>
        {items.map(([label, value]) => (
          <div key={label} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: compact ? "7px 5px" : "9px 10px", textAlign: compact ? "center" : "left" }}>
            <div className="mono" style={{ color: C.faint, fontSize: compact ? 9 : 10, fontWeight: 800 }}>{label}</div>
            <div className="mono" style={{ color: r.color, fontSize: compact ? 12 : 16, fontWeight: 900, marginTop: 2, whiteSpace: "nowrap" }}>{value}</div>
          </div>
        ))}
      </div>
      {!compact && <div style={{ color: C.text, fontSize: 14, lineHeight: 1.5, marginTop: 10, fontWeight: 650 }}>{r.msg}</div>}
      {!compact && r.reasons && r.reasons.length > 0 && (
        <div style={{ color: C.dim, fontSize: 12.5, lineHeight: 1.45, marginTop: 7 }}>Why: {r.reasons.join(", ")}.</div>
      )}
    </div>
  );
}

function GarminCard({ garmin, tk, checkin, onCheckin }) {
  const stale = !!(garmin && garmin.date !== tk);
  const r = readiness(stale ? null : garmin, checkin);
  const M = ({ l, v, u }) => v == null ? null : (
    <div style={{ minWidth: 74, flex: "1 1 26%", background: C.bg, borderRadius: 9, padding: "8px 9px", border: `1px solid ${C.border}` }}>
      <div className="mono" style={{ fontSize: 10, color: C.faint, fontWeight: 800 }}>{l}</div>
      <div className="mono" style={{ fontSize: 17, fontWeight: 800, marginTop: 2 }}>{v}<span style={{ fontSize: 11, color: C.dim }}>{u}</span></div>
    </div>
  );
  return (
    <>
      <div style={{ background: C.card, border: `2px solid ${C.border}`, borderRadius: 16, padding: 14, marginBottom: 12 }}>
        <div className="mono" style={{ fontSize: 12, color: C.text, fontWeight: 900, letterSpacing: .6 }}>HOW DO YOU FEEL?</div>
        <div style={{ color: C.dim, fontSize: 13, lineHeight: 1.4, marginTop: 4 }}>Choose WIRED / DRAINED whenever in doubt. It automatically reduces today's dose.</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 7, marginTop: 10 }}>
          {[["calm", "CALM"], ["normal", "NORMAL"], ["wired", "WIRED /\nDRAINED"]].map(([id, label]) => {
            const active = checkin === id;
            const color = id === "wired" ? C.hot : id === "calm" ? C.green : C.amber;
            return <button key={id} onClick={() => onCheckin(id)} aria-pressed={active}
              style={{ minHeight: 54, whiteSpace: "pre-line", borderRadius: 11, border: `2px solid ${active ? color : C.border}`, background: active ? `${color}22` : C.surface, color: active ? color : C.dim, fontSize: 12, fontWeight: 900 }}>{label}</button>;
          })}
        </div>
      </div>

      <div style={{ background: C.card, border: `2px solid ${r ? r.color : C.border}`, borderRadius: 16, padding: 14, marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <div className="mono" style={{ fontSize: 12, color: C.text, fontWeight: 900 }}>
            GARMIN RECOVERY{stale ? ` \u00b7 ${garmin.date} (OLD)` : ""}
          </div>
          {!garmin && <div className="mono" style={{ color: C.amber, fontSize: 11, fontWeight: 800 }}>NO DATA</div>}
        </div>
        {garmin ? (
          <div style={{ display: "flex", gap: 7, marginTop: 11, flexWrap: "wrap" }}>
            <M l="SLEEP" v={garmin.sleep_score} u="" />
            <M l="HOURS" v={garmin.sleep_hours} u="h" />
            <M l="HRV" v={garmin.hrv} u="ms" />
            <M l="RHR" v={garmin.resting_hr} u="" />
            <M l="BATTERY" v={garmin.body_battery} u="" />
            <M l="STRESS" v={garmin.stress} u="" />
          </div>
        ) : <div style={{ color: C.dim, fontSize: 13, marginTop: 8 }}>Run the Garmin sync or train conservatively.</div>}
        {garmin && garmin.weight_kg != null && !stale && (
          <div className="mono" style={{ fontSize: 11, color: C.green, marginTop: 9, fontWeight: 800 }}>\u2713 SCALE WEIGHT {garmin.weight_kg}KG AUTO-LOGGED</div>
        )}
      </div>

      <TrainingDose r={r} />
      <div style={{ color: C.faint, fontSize: 11.5, lineHeight: 1.45, margin: "-4px 2px 14px" }}>
        Garmin does not measure cortisol. This is a conservative training guide based on recovery signals, not medical advice. Stop for chest pain, faintness or unusual symptoms and follow your clinician's plan.
      </div>
    </>
  );
}

function Stat({ label, value, color }) {
  return (
    <div>
      <div className="mono" style={{ fontSize: 10, color: C.faint }}>{label}</div>
      <div className="mono" style={{ fontSize: 17, fontWeight: 600, color: color || C.text }}>{value}</div>
    </div>
  );
}

function BigStat({ label, value, unit, goal, start }) {
  const pct = Math.max(0, Math.min(1, (start - value) / (start - goal)));
  const toGo = (value - goal).toFixed(1);
  return (
    <div style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: 14 }}>
      <div className="mono" style={{ fontSize: 10, color: C.faint }}>{label}</div>
      <div className="anton" style={{ fontSize: 30, marginTop: 2 }}>
        {value}<span style={{ fontSize: 15, color: C.dim }}>{unit}</span>
      </div>
      <div style={{ height: 5, background: C.border, borderRadius: 3, marginTop: 8 }}>
        <div style={{ height: 5, width: `${pct * 100}%`, background: C.amber, borderRadius: 3 }} />
      </div>
      <div className="mono" style={{ fontSize: 10.5, color: C.dim, marginTop: 5 }}>{toGo > 0 ? `${toGo} to goal` : "GOAL HIT \ud83c\udfc1"}</div>
    </div>
  );
}

function Chart({ data, goal, color }) {
  if (!data || data.length < 2) {
    return <div style={{ background: C.card, border: `1px dashed ${C.border}`, borderRadius: 12, padding: "22px 14px", fontSize: 12.5, color: C.faint, textAlign: "center" }}>
      Log at least two entries to see your trend.
    </div>;
  }
  const W = 320, H = 110, pad = 8;
  const all = [...data, goal];
  const min = Math.min(...all) - 0.5, max = Math.max(...all) + 0.5;
  const x = (i) => pad + (i / (data.length - 1)) * (W - pad * 2);
  const y = (v) => pad + (1 - (v - min) / (max - min)) * (H - pad * 2);
  const path = data.map((v, i) => `${i ? "L" : "M"}${x(i)},${y(v)}`).join(" ");
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 8px" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", display: "block" }}>
        <line x1={pad} x2={W - pad} y1={y(goal)} y2={y(goal)} stroke={C.green} strokeDasharray="4 4" strokeWidth="1" />
        <text x={W - pad} y={y(goal) - 4} textAnchor="end" fill={C.green} fontSize="9" fontFamily="monospace">GOAL {goal}</text>
        <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {data.map((v, i) => <circle key={i} cx={x(i)} cy={y(v)} r="3" fill={color} />)}
        <text x={x(data.length - 1)} y={y(data[data.length - 1]) - 8} textAnchor="end" fill={C.text} fontSize="10" fontWeight="700" fontFamily="monospace">{data[data.length - 1]}</text>
      </svg>
    </div>
  );
}

function BodyLogger({ onSave, last, today }) {
  const [kg, setKg] = useState("");
  const [waist, setWaist] = useState("");
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14 }}>
      <div style={{ display: "flex", gap: 8 }}>
        <input inputMode="decimal" placeholder={today && today.kg ? `${today.kg} kg \u2713` : last && last.kg ? `${last.kg} kg` : "kg"} value={kg}
          onChange={(e) => setKg(e.target.value)} style={inp(false)} />
        <input inputMode="decimal" placeholder={today && today.waist ? `${today.waist} cm \u2713` : last && last.waist ? `${last.waist} cm` : "waist cm"} value={waist}
          onChange={(e) => setWaist(e.target.value)} style={inp(false)} />
        <button onClick={() => { onSave(kg, waist); setKg(""); setWaist(""); }}
          style={{ flexShrink: 0, padding: "0 18px", height: 52, borderRadius: 10, background: C.amber, color: "#111", border: "none", fontWeight: 800, fontSize: 13 }}>
          LOG
        </button>
      </div>
      <div style={{ fontSize: 11, color: C.faint, marginTop: 8 }}>Weigh in fasted, same time each morning. Waist at navel, relaxed.</div>
    </div>
  );
}

function SectionTitle({ children }) {
  return <div className="mono" style={{ fontSize: 11, fontWeight: 700, color: C.dim, letterSpacing: 1.5, margin: "22px 2px 10px" }}>{children}</div>;
}

function Rule({ t, d, hot }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${hot ? C.hot + "55" : C.border}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
      <div style={{ fontSize: 13.5, fontWeight: 700, color: hot ? C.hot : C.text }}>{t}</div>
      <div style={{ fontSize: 12.5, color: C.dim, marginTop: 3, lineHeight: 1.5 }}>{d}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<VTaperCoach />);
</script>

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
